{% set name = "simdna" %}
{% set version = "0.4.3.2" %}
{% set sha256 = "bcb041dd48056ee351e239235607e27c9f9032c4a5ac342c60b9d27ce50b29dc" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 2
  script: python setup.py install --single-version-externally-managed --record record.txt

requirements:
  host:
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}
    - setuptools
    - matplotlib-base
    - scipy
    - numpy >=1.9

test:
  requires:
    - python {{ python_min }}
  imports:
    - simdna

about:
  home: https://github.com/kundajelab/simdna
  license: MIT
  license_file: '{{ environ["RECIPE_DIR"] }}/LICENSE'
  license_family: MIT
  summary: 'Simulated datasets of DNA'
  description: |
    Simulated datasets of DNA.
  doc_url: https://kundajelab.github.io/simdna/
  dev_url: https://kundajelab.github.io/simdna/

extra:
  recipe-maintainers:
    - lilleswing
